<button
  type="button"
  class="group relative flex min-h-[13.5rem] w-full overflow-hidden rounded-[1.4rem] border border-white/40 bg-stone-900 text-left shadow-[0_25px_80px_rgba(41,37,36,0.18)] transition duration-300 hover:-translate-y-1 hover:shadow-[0_30px_90px_rgba(41,37,36,0.22)] focus:outline-none focus:ring-4 focus:ring-amber-300 sm:min-h-[15rem] sm:rounded-[1.6rem] md:min-h-[14rem] lg:min-h-[16.5rem] lg:rounded-[2rem]"
  (click)="selected.emit()"
>
  <img
    [src]="image()"
    [alt]="title()"
    class="absolute inset-0 h-full w-full object-cover transition duration-500 group-hover:scale-105"
  />
  <div class="absolute inset-0 bg-gradient-to-b from-stone-950/8 via-stone-950/18 to-stone-950/88"></div>
  <div class="absolute inset-0 opacity-0 transition duration-300 group-hover:opacity-100 bg-[radial-gradient(circle_at_top_right,rgba(251,191,36,0.22),transparent_30%)]"></div>

  <div class="relative z-10 mt-auto flex w-full flex-col gap-2.5 p-3.5 text-stone-50 sm:p-4 md:p-4 lg:gap-3 lg:p-5">
    <div class="flex items-start gap-3">
      @if (badge()) {
        <span class="w-fit rounded-full bg-white/15 px-3 py-1 text-xs font-bold uppercase tracking-[0.22em] text-amber-200">
          {{ badge() }}
        </span>
      }
    </div>

    <div class="space-y-1.5">
      <h3 class="font-['Sora'] text-[1.45rem] font-semibold leading-tight sm:text-[1.7rem] md:text-[1.55rem] lg:text-3xl">
        {{ title() }}
      </h3>
      <p class="max-w-xl text-[0.8rem] leading-5 text-stone-200/90 sm:text-[0.84rem] md:text-[0.8rem] lg:text-base lg:leading-6">
        {{ description() }}
      </p>
    </div>

    <span class="inline-flex w-fit rounded-full border border-white/18 bg-white/12 px-3 py-1.5 text-[0.72rem] font-black uppercase tracking-[0.18em] text-white transition group-hover:border-amber-300 group-hover:bg-amber-400 group-hover:text-stone-900">
      {{ actionLabel() }}
    </span>
  </div>
</button>

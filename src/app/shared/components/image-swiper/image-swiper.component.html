<swiper-container
  #swiperElement
  init="false"
  [attr.aria-label]="ariaLabel()"
  class="block h-full w-full overflow-hidden"
  [ngClass]="frameClasses()"
>
  @for (slide of slides(); track slide.src) {
    <swiper-slide class="h-full">
      <div class="relative h-full w-full overflow-hidden" [ngClass]="frameClasses()">
        <img
          [src]="slide.src"
          [alt]="slide.alt"
          class="h-full w-full object-cover screen-saver-slide"
          [style.animationDuration.ms]="autoplayDelay()"
        />

        @if (slide.badge) {
          <span class="absolute left-4 top-4 z-10 rounded-full bg-stone-950/55 px-3 py-1 text-xs font-bold uppercase tracking-[0.18em] text-amber-100 backdrop-blur">
            {{ slide.badge }}
          </span>
        }
      </div>
    </swiper-slide>
  }
</swiper-container>

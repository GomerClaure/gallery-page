@if (media(); as activeMedia) {
  <div class="absolute inset-0 z-30 flex items-center justify-center bg-stone-950/55 p-5 backdrop-blur-sm">
    <div class="w-full max-w-4xl overflow-hidden rounded-[2rem] border border-white/70 bg-white shadow-[0_30px_90px_rgba(15,23,42,0.3)]">
      <div class="flex items-center justify-between border-b border-stone-200 px-6 py-5">
        <div>
          <p class="text-xs font-semibold uppercase tracking-[0.24em] text-stone-500">Reproducción</p>
          <h3 class="mt-2 text-2xl font-semibold text-stone-900">{{ activeMedia.title }}</h3>
        </div>

        <button
          type="button"
          class="flex h-12 w-12 items-center justify-center rounded-full border border-stone-200 text-xl text-stone-500 transition duration-300 hover:bg-stone-100"
          (click)="closed.emit()"
        >
          ×
        </button>
      </div>

      <div class="bg-stone-950 p-4">
        <video
          class="aspect-video w-full rounded-[1.5rem] bg-stone-950"
          controls
          autoplay
          [poster]="activeMedia.thumbnail"
          [src]="activeMedia.source"
        ></video>
      </div>
    </div>
  </div>
}

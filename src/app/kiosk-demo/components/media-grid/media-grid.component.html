<section class="space-y-5">
  <div class="flex items-center justify-between gap-4">
    <div>
      <p class="text-xs font-semibold uppercase tracking-[0.24em] text-stone-500">
        Galería multimedia
      </p>
      <h3 class="mt-2 text-3xl font-semibold text-stone-900">
        Eventos y presentaciones relacionadas
      </h3>
    </div>
    <p class="text-sm text-stone-500">{{ events().length }} eventos disponibles</p>
  </div>

  <div class="grid gap-4 xl:grid-cols-2">
    @for (event of events(); track event.id) {
      <button
        type="button"
        class="group overflow-hidden rounded-[1.75rem] border border-stone-200 bg-white text-left shadow-sm transition duration-300 hover:-translate-y-1 hover:shadow-xl focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-stone-400"
        (click)="eventSelected.emit(event.id)"
      >
        <div class="relative">
          <img
            [src]="event.coverImage"
            [alt]="event.name"
            class="h-56 w-full object-cover transition duration-500 group-hover:scale-105"
          />
          <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-stone-950/70 via-stone-950/20 to-transparent p-5">
            <span class="inline-flex rounded-full bg-white/90 px-3 py-1 text-xs font-semibold uppercase tracking-[0.2em] text-stone-700">
              Evento escénico
            </span>
          </div>
        </div>

        <div class="space-y-4 p-5">
          <div class="flex items-start justify-between gap-3">
            <div>
              <h4 class="text-2xl font-semibold text-stone-900">{{ event.name }}</h4>
              <p class="mt-1 text-sm font-medium text-stone-500">{{ event.year }}</p>
            </div>

            <span class="rounded-full bg-stone-100 px-3 py-1 text-xs font-semibold uppercase tracking-[0.2em] text-stone-500">
              Ver detalle
            </span>
          </div>

          <p class="text-sm leading-6 text-stone-600">
            {{ event.summary }}
          </p>

          <div class="flex flex-wrap gap-3">
            <span class="rounded-full bg-stone-100 px-4 py-2 text-sm font-medium text-stone-700">
              {{ photoCount(event) }} fotos
            </span>
            <span class="rounded-full bg-stone-100 px-4 py-2 text-sm font-medium text-stone-700">
              {{ videoCount(event) }} videos
            </span>
          </div>
        </div>
      </button>
    }
  </div>
</section>

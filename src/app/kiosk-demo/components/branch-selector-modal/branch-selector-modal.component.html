<div class="absolute inset-0 z-20 flex items-center justify-center bg-stone-950/35 p-4 backdrop-blur-sm">
  <div class="w-full max-w-xl rounded-[2rem] border border-white/70 bg-white/95 p-6 shadow-[0_30px_90px_rgba(15,23,42,0.24)] sm:p-8">
    <div class="mb-6 space-y-2">
      <span class="text-xs font-semibold uppercase tracking-[0.26em] text-stone-500">
        Bienvenido
      </span>
      <h2 class="font-display text-3xl font-semibold text-stone-900">
        Selecciona una sucursal
      </h2>
      <p class="text-sm leading-6 text-stone-600">
        Elige la sede desde la que deseas explorar la experiencia BAFOTT 2026.
      </p>
    </div>

    <div class="space-y-3">
      @for (branch of branches(); track branch.id) {
        <button
          type="button"
          class="flex w-full items-start justify-between rounded-[1.5rem] border px-5 py-4 text-left transition duration-300 hover:-translate-y-0.5 hover:shadow-md focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-stone-400"
          [class.border-stone-900]="selectedBranchId() === branch.id"
          [class.bg-stone-900]="selectedBranchId() === branch.id"
          [class.text-white]="selectedBranchId() === branch.id"
          [class.border-stone-200]="selectedBranchId() !== branch.id"
          [class.bg-stone-50]="selectedBranchId() !== branch.id"
          [class.text-stone-700]="selectedBranchId() !== branch.id"
          (click)="selected.emit(branch.id)"
        >
          <div class="space-y-1">
            <p class="text-base font-semibold">{{ branch.name }}</p>
            <p
              class="text-sm"
              [class.text-white]="selectedBranchId() === branch.id"
              [class.opacity-75]="selectedBranchId() === branch.id"
              [class.text-stone-500]="selectedBranchId() !== branch.id"
            >
              {{ branch.city }} · {{ branch.address }}
            </p>
            <p
              class="text-xs"
              [class.text-white]="selectedBranchId() === branch.id"
              [class.opacity-70]="selectedBranchId() === branch.id"
              [class.text-stone-500]="selectedBranchId() !== branch.id"
            >
              {{ branch.note }}
            </p>
          </div>
          <span
            class="mt-1 inline-flex h-6 w-6 shrink-0 items-center justify-center rounded-full border text-xs"
            [class.border-white]="selectedBranchId() === branch.id"
            [class.opacity-60]="selectedBranchId() === branch.id"
            [class.border-stone-300]="selectedBranchId() !== branch.id"
          >
            @if (selectedBranchId() === branch.id) {
              ✓
            }
          </span>
        </button>
      }
    </div>

    <button
      type="button"
      class="mt-6 inline-flex h-14 w-full items-center justify-center rounded-full bg-stone-900 px-6 text-base font-semibold text-white shadow-lg shadow-stone-900/10 transition duration-300 hover:-translate-y-0.5 hover:bg-stone-800 disabled:cursor-not-allowed disabled:bg-stone-300"
      [disabled]="!selectedBranchId()"
      (click)="confirmed.emit()"
    >
      Continuar
    </button>
  </div>
</div>

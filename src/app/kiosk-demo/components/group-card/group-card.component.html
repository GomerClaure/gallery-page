<button
  type="button"
  class="group flex w-full flex-col overflow-hidden rounded-[2rem] border border-white/70 bg-white p-3 text-left shadow-sm transition duration-300 hover:-translate-y-1 hover:shadow-xl focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-stone-400"
  (click)="selected.emit(group().id)"
>
  <div class="relative overflow-hidden rounded-[1.5rem]">
    <img
      [src]="group().coverImage"
      [alt]="group().name"
      class="h-48 w-full object-cover transition duration-500 group-hover:scale-105"
    />
    <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-stone-950/60 to-transparent px-5 py-4">
      <span class="inline-flex rounded-full bg-white/85 px-3 py-1 text-xs font-semibold uppercase tracking-[0.24em] text-stone-700">
        {{ group().audience }}
      </span>
    </div>
  </div>

  <div class="space-y-3 p-4">
    <div>
      <h3 class="font-display text-2xl font-semibold text-stone-900">{{ group().name }}</h3>
      <p class="mt-2 text-sm leading-6 text-stone-500">{{ group().tagline }}</p>
    </div>

    <div class="inline-flex items-center gap-2 text-sm font-semibold text-stone-700">
      <span>Ver niveles</span>
      <span aria-hidden="true" class="transition group-hover:translate-x-1">→</span>
    </div>
  </div>
</button>

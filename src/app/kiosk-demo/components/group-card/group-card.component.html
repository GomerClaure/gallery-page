<button
  type="button"
  class="group-card"
  [class.group-card--ninos]="group().id === 'ninos'"
  [class.group-card--jovenes]="group().id === 'jovenes'"
  [class.group-card--adultos]="group().id === 'adultos'"
  [class.group-card--talleres]="group().id === 'talleres'"
  (click)="selected.emit(group().id)"
>
  <span class="group-card__cue" aria-hidden="true"></span>

  <div class="group-card__media">
    <img [src]="group().coverImage" [alt]="group().name" class="group-card__image" />

    <div class="group-card__audience-wrap">
      <span class="group-card__audience">{{ group().audience }}</span>
    </div>
  </div>

  <div class="group-card__body">
    <div class="group-card__content">
      <span class="group-card__badge">{{ group().name }}</span>
      <h3 class="group-card__title">{{ group().name }}</h3>
      <p class="group-card__tagline">{{ group().tagline }}</p>
      <div class="group-card__action">
        <span>Explorar niveles</span>
        <span aria-hidden="true" class="group-card__action-arrow">→</span>
      </div>
    </div>

    <span class="group-card__icon" aria-hidden="true">→</span>
  </div>
</button>

<section class="rounded-[1.75rem] border border-stone-200 bg-white p-5 shadow-sm">
  <div class="flex items-center gap-4">
    <img
      [src]="teacher().portrait"
      [alt]="teacher().name"
      class="h-20 w-20 rounded-[1.25rem] object-cover"
    />
    <div>
      <p class="text-xs font-semibold uppercase tracking-[0.24em] text-stone-500">Docencia</p>
      <h3 class="mt-2 text-2xl font-semibold text-stone-900">{{ teacher().name }}</h3>
      <p class="text-sm font-medium text-stone-500">{{ teacher().role }}</p>
    </div>
  </div>

  <p class="mt-4 text-sm leading-6 text-stone-600">
    {{ teacher().bio }}
  </p>
</section>

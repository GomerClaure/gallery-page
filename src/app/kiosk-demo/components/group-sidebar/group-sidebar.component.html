<aside class="flex h-full flex-col justify-between rounded-[2rem] border border-stone-200 bg-stone-50/90 p-6">
  <div class="space-y-6">
    <div class="flex items-center justify-between gap-3">
      <div>
        <h2 class="font-display text-3xl font-semibold text-stone-900">{{ level().name }}</h2>
        <p class="mt-1 text-sm font-medium text-stone-500">{{ branch()?.name ?? 'BAFOTT 2026' }}</p>
      </div>
      <span class="rounded-full bg-white px-3 py-1 text-xs font-semibold uppercase tracking-[0.24em] text-stone-500">
        {{ group().name }}
      </span>
    </div>

    <p class="text-sm leading-7 text-stone-600">
      {{ level().description }}
    </p>

    <div class="rounded-[1.5rem] border border-white bg-white p-4 shadow-sm">
      <p class="text-xs font-semibold uppercase tracking-[0.24em] text-stone-500">Enfoque</p>
      <p class="mt-2 text-base font-semibold text-stone-800">{{ group().tagline }}</p>
    </div>
  </div>

  <div class="rounded-[1.5rem] border border-white bg-white p-4 shadow-sm">
    <p class="text-xs font-semibold uppercase tracking-[0.24em] text-stone-500">Descripción breve</p>
    <p class="mt-2 text-sm leading-6 text-stone-600">
      {{ group().description }}
    </p>
  </div>
</aside>

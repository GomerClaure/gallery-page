<app-screen-container [compact]="true">
  <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
    <app-back-button (pressed)="goBack()" />
    <app-tab-navigation
      [tabs]="tabs"
      [activeTab]="activeTab()"
      (tabChanged)="setTab($event)"
    />
  </div>

  <div class="grid flex-1 gap-5 xl:grid-cols-[360px_minmax(0,1fr)]">
    <app-group-sidebar
      [branch]="content.selectedBranch()"
      [group]="group"
      [level]="level"
    />

    <section class="rounded-[2rem] border border-stone-200 bg-stone-50/70 p-5">
      @if (activeTab() === 'info') {
        <div class="space-y-5">
          <article class="rounded-[1.75rem] border border-stone-200 bg-white p-5 shadow-sm">
            <p class="text-xs font-semibold uppercase tracking-[0.24em] text-stone-500">
              Resumen del nivel
            </p>
            <div class="mt-4 flex flex-wrap items-center gap-3">
              <h3 class="text-3xl font-semibold text-stone-900">{{ level.name }}</h3>
              <span class="rounded-full bg-stone-100 px-3 py-1 text-xs font-semibold uppercase tracking-[0.2em] text-stone-500">
                {{ group.name }}
              </span>
              <span class="rounded-full bg-amber-100 px-3 py-1 text-xs font-semibold uppercase tracking-[0.2em] text-amber-700">
                {{ content.selectedBranch()?.name ?? 'Sucursal activa' }}
              </span>
            </div>
            <p class="mt-4 max-w-3xl text-sm leading-7 text-stone-600">
              {{ level.description }}
            </p>
          </article>

          <div class="grid gap-5 xl:grid-cols-[minmax(0,0.95fr)_minmax(0,1.05fr)]">
            <app-schedule-card [schedules]="level.schedules" />
            <app-teacher-card [teacher]="level.teacher" />
            <app-dance-tag-list [dances]="level.dances" />
          </div>
        </div>
      }

      @if (activeTab() === 'gallery') {
        <app-media-grid [events]="level.events" (eventSelected)="openEvent($event)" />
      }
    </section>
  </div>
</app-screen-container>

<app-screen-container [compact]="true">
  <div class="mb-4">
    <app-back-button (pressed)="goBack()" />
  </div>

  <div class="grid gap-5 xl:grid-cols-[minmax(0,0.95fr)_minmax(320px,0.75fr)]">
    <section class="overflow-hidden rounded-[2rem] border border-white/60 bg-stone-950 shadow-[0_24px_80px_rgba(15,23,42,0.18)]">
      <div class="h-[320px]">
        <app-image-swiper
          [slides]="heroSlides()"
          [autoplayDelay]="3600"
          effectName="fade"
          [rounded]="true"
          [pagination]="true"
          [allowTouchMove]="true"
          ariaLabel="Resumen visual del evento"
        />
      </div>
    </section>

    <section class="rounded-[2rem] border border-stone-200 bg-white p-6 shadow-sm">
      <p class="text-xs font-semibold uppercase tracking-[0.24em] text-stone-500">
        Evento relacionado
      </p>
      <h1 class="mt-3 text-4xl font-semibold text-stone-900">{{ event.name }}</h1>
      <p class="mt-2 text-sm font-medium text-stone-500">
        {{ event.year }} · {{ level.name }} · {{ content.selectedBranch()?.name }}
      </p>

      <p class="mt-5 text-sm leading-7 text-stone-600">
        {{ event.summary }}
      </p>

      <div class="mt-6 flex flex-wrap gap-3">
        <span class="rounded-full bg-stone-100 px-4 py-2 text-sm font-medium text-stone-700">
          {{ photoCount() }} fotos
        </span>
        <span class="rounded-full bg-stone-100 px-4 py-2 text-sm font-medium text-stone-700">
          {{ videoCount() }} videos
        </span>
        <span class="rounded-full bg-amber-100 px-4 py-2 text-sm font-medium text-amber-700">
          {{ group.name }}
        </span>
      </div>
    </section>
  </div>

  <section class="relative mt-5 rounded-[2rem] border border-stone-200 bg-stone-50/70 p-5">
    <app-event-media-gallery [media]="event.media" (videoSelected)="openVideo($event)" />
    <app-video-modal [media]="activeVideo()" (closed)="closeVideo()" />
  </section>
</app-screen-container>

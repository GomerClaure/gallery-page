<app-screen-container [compact]="true">
  <div class="relative flex flex-1">
    <app-hero-welcome
      [branch]="content.selectedBranch()"
      (start)="openGroups()"
    />

    @if (shouldShowModal()) {
      <app-branch-selector-modal
        (onClose)="closeBranchSelector()"
        (onBranchSelected)="onBranchSelected()"
      />
    }
  </div>
</app-screen-container>

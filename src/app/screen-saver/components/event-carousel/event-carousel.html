<div
  class="event-carousel"
  (touchstart)="onTouchStart($event)"
  (touchend)="onTouchEnd($event)"
>
  @for (item of items(); track item.src; let index = $index) {
    <figure
      class="event-carousel__slide"
      [class.event-carousel__slide--active]="index === activeIndex()"
      [attr.aria-hidden]="index !== activeIndex()"
    >
      <img [src]="item.src" [alt]="item.alt" />
      <figcaption>{{ item.category }}</figcaption>
    </figure>
  }

  @if (showIndicators() && totalItems() > 1) {
    <div class="event-carousel__indicators" aria-label="Indicadores del carrusel">
      @for (item of items(); track item.src; let index = $index) {
        <button
          type="button"
          class="event-carousel__indicator"
          [class.event-carousel__indicator--active]="index === activeIndex()"
          [attr.aria-label]="'Ir a la imagen ' + (index + 1)"
          (click)="select(index)"
        ></button>
      }
    </div>
  }
</div>

<section class="space-y-5">
  <div class="flex items-center justify-between gap-4">
    <div>
      <p class="text-xs font-semibold uppercase tracking-[0.24em] text-stone-500">
        Contenido multimedia
      </p>
      <h3 class="mt-2 text-3xl font-semibold text-stone-900">
        Fotos y videos del evento
      </h3>
    </div>
    <p class="text-sm text-stone-500">{{ media().length }} piezas disponibles</p>
  </div>

  <div class="media-masonry">
    @for (item of media(); track item.id; let index = $index) {
      <article
        class="media-card"
        [class]="orderedSizes[index % orderedSizes.length]"
      >
        <button
          type="button"
          class="media-card-button group h-full w-full overflow-hidden text-left transition duration-300 hover:-translate-y-1 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-stone-400"
          (click)="mediaSelected.emit(item)"
        >
          <div class="relative">
            <img
              [src]="item.thumbnail"
              [alt]="item.title"
              class="h-full min-h-56 w-full object-cover transition duration-500 group-hover:scale-105"
            />
            <span class="absolute left-4 top-4 rounded-full bg-white/90 px-3 py-1 text-xs font-semibold uppercase tracking-[0.2em] text-stone-700">
              {{ item.type === 'video' ? 'Video' : 'Foto' }}
            </span>

            @if (item.type === 'video') {
              <span class="absolute inset-0 flex items-center justify-center">
                <span class="flex h-16 w-16 items-center justify-center rounded-full bg-white/90 text-2xl text-stone-900 shadow-lg">
                  ▶
                </span>
              </span>
            }
          </div>

          <div class="space-y-2 px-1 pb-1 pt-3 sm:px-2">
            <div class="flex items-center justify-between gap-3">
              <h4 class="text-lg font-semibold text-stone-900">{{ item.title }}</h4>
              <span class="rounded-full bg-stone-100 px-3 py-1 text-[0.7rem] font-semibold uppercase tracking-[0.18em] text-stone-500">
                {{ item.category }}
              </span>
            </div>
            <p class="text-sm leading-6 text-stone-500">{{ item.description }}</p>
          </div>
        </button>
      </article>
    }
  </div>
</section>

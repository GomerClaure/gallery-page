@if (media(); as activeMedia) {
  <div class="media-lightbox" (click)="closed.emit()">
    <div class="media-lightbox-panel" (click)="$event.stopPropagation()">
      <div class="media-lightbox-header">
        <div>
          <p class="text-xs font-semibold uppercase tracking-[0.24em] text-stone-400">
            {{ activeMedia.type === 'video' ? 'Reproducción' : 'Vista previa' }}
          </p>
          <h3 class="mt-2 text-2xl font-semibold text-white">{{ activeMedia.title }}</h3>
          <p class="mt-2 text-sm leading-6 text-stone-300">{{ activeMedia.description }}</p>
        </div>

        <button
          type="button"
          class="flex h-12 w-12 shrink-0 items-center justify-center rounded-full border border-white/15 bg-white/6 text-xl text-white transition duration-300 hover:bg-white/12"
          (click)="closed.emit()"
        >
          ×
        </button>
      </div>

      <div class="media-lightbox-content">
        <div class="media-lightbox-frame">
          @if (activeMedia.type === 'image') {
            <img
              [src]="activeMedia.source"
              [alt]="activeMedia.title"
            />
          } @else {
            <video
              controls
              autoplay
              [poster]="activeMedia.thumbnail"
              [src]="activeMedia.source"
            ></video>
          }
        </div>
      </div>
    </div>
  </div>
}

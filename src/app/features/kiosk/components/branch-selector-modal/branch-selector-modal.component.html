<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/45 p-3 sm:p-4"
  (click)="closeModal()"
>
  <div
    class="flex h-[min(92vh,760px)] w-full max-w-[760px] flex-col overflow-hidden rounded-[28px] bg-[#FFFFFF] shadow-[0_12px_32px_rgba(0,124,145,0.14)]"
    (click)="$event.stopPropagation()"
  >
    <!-- Header -->
    <div class="border-b border-black/5 bg-gradient-to-br from-[#F4FAFC] via-white to-[#F4FAFC] px-4 pb-4 pt-4 sm:px-6 sm:pb-5 sm:pt-5">
      <div class="grid grid-cols-[44px_1fr_44px] items-center gap-2">
        <button
          type="button"
          class="flex h-11 w-11 items-center justify-center rounded-full bg-slate-100 text-[20px] font-semibold text-[#1A1A1A] transition-colors duration-100 motion-reduce:transition-none hover:bg-[#E53935] hover:text-white"
          (click)="closeModal()"
          title="Cerrar"
          aria-label="Cerrar modal"
        >
          ✕
        </button>

        <div class="flex justify-center">
          <img
            src="assets/logo-bafott.png"
            alt="BAFOTT"
            class="h-10 w-auto object-contain sm:h-12"
          />
        </div>

        <div></div>
      </div>

      <div class="mt-4 text-center sm:mt-5">
        <span
          class="inline-flex rounded-full bg-[#00A8CC]/10 px-3 py-1 text-[11px] font-bold uppercase tracking-[0.22em] text-[#007C91] sm:text-xs"
        >
          Bienvenido
        </span>

        <h2 class="mt-3 text-2xl font-extrabold tracking-tight text-[#1A1A1A] sm:text-[30px]">
          Selecciona una sucursal
        </h2>

        <p class="mx-auto mt-2 max-w-[520px] text-sm leading-6 text-[#1A1A1A]/70 sm:text-[15px]">
          Elige la sede desde la que deseas explorar la experiencia BAFOTT 2026.
        </p>
      </div>
    </div>

    <!-- Body -->
    <div class="flex min-h-0 flex-1 flex-col bg-[#F4FAFC]">
      <div class="min-h-0 flex-1 overflow-y-auto overscroll-contain px-3 py-3 sm:px-4 sm:py-4">
        <div class="grid grid-cols-1 gap-3 sm:gap-4">
          @for (branch of branches(); track branch.id) {
            <button
              type="button"
              class="grid w-full grid-cols-[1fr_auto] items-start gap-3 rounded-[20px] border-2 bg-white p-4 text-left transition-colors duration-100 motion-reduce:transition-none sm:p-5"
              [ngClass]="selectedBranchId() === branch.id
                ? 'border-cyan-600 bg-cyan-50'
                : 'border-slate-200 bg-white hover:border-cyan-400'"
              (click)="selectBranch(branch.id)"
            >
              <div class="min-w-0">
                <p class="text-base font-bold text-[#1A1A1A] sm:text-[17px]">
                  {{ branch.name }}
                </p>

                <p class="mt-1 text-sm leading-5 text-[#1A1A1A]/70">
                  {{ branch.city }} · {{ branch.address }}
                </p>

                <p class="mt-2 line-clamp-2 text-[13px] leading-5 text-[#1A1A1A]/55 sm:text-sm">
                  {{ branch.note }}
                </p>
              </div>

              <span
                class="mt-0.5 flex h-8 w-8 min-w-8 items-center justify-center rounded-full border-2 border-cyan-600 text-sm font-extrabold transition-colors duration-75 motion-reduce:transition-none"
                [ngClass]="selectedBranchId() === branch.id
                  ? 'bg-cyan-600 text-white'
                  : 'bg-white text-cyan-600'"
              >
                @if (selectedBranchId() === branch.id) {
                  ✓
                }
              </span>
            </button>
          }
        </div>
      </div>

      <!-- Footer -->
      <div class="border-t border-black/5 bg-white p-3 sm:p-4">
        <button
          type="button"
          class="flex h-14 w-full items-center justify-center rounded-[18px] bg-[#00A8CC] px-5 text-base font-bold text-white shadow-[0_8px_16px_rgba(0,168,204,0.22)] transition-colors duration-100 motion-reduce:transition-none hover:bg-[#007C91] disabled:cursor-not-allowed disabled:bg-slate-300 disabled:shadow-none"
          [disabled]="!selectedBranchId()"
          (click)="confirmSelection()"
        >
          Continuar
        </button>
      </div>
    </div>
  </div>
</div>

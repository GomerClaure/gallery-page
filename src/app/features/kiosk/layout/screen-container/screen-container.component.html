<section
  class="relative mx-auto flex min-h-dvh w-full max-w-[1440px] flex-col"
  [class]="
    variant() === 'kiosk-clean'
      ? 'px-3 py-3 sm:px-4 sm:py-4 lg:px-5 lg:py-5'
      : 'px-4 py-4 sm:px-6 sm:py-6 lg:px-8 lg:py-8'
  "
  [appIdleReturnHome]="idleMs()"
  [appIdleReturnTarget]="'/'"
>
  @if (variant() === 'default') {
    <div class="pointer-events-none absolute inset-0 overflow-hidden rounded-[2rem]">
      <div
        class="floating-orb absolute left-[8%] top-[10%] h-40 w-40 rounded-full bg-amber-200/50 blur-3xl"
      ></div>
      <div
        class="floating-orb-delayed absolute bottom-[12%] right-[10%] h-56 w-56 rounded-full bg-sky-200/40 blur-3xl"
      ></div>
    </div>
  }

  <div
    class="relative flex flex-1 flex-col overflow-hidden rounded-4xl border shadow-[0_24px_80px_rgba(148,163,184,0.18)]"
    [class]="
      (variant() === 'kiosk-clean'
        ? 'border-sky-100/70 bg-[var(--color-surface)] shadow-[0_22px_56px_rgba(15,23,42,0.14)]'
        : 'border-white/60 bg-white/80 backdrop-blur-xl')
    "
  >
    <div class="flex min-h-0 flex-1 flex-col">
      <ng-content />
    </div>
  </div>
</section>

<aside class="group-sidebar">
  <div class="group-sidebar-hero">
    <img [src]="level().coverImage || group().coverImage" [alt]="level().name" />
    <div class="group-sidebar-hero-overlay"></div>

    <div class="group-sidebar-hero-content">
      <p class="group-sidebar-eyebrow">{{ group().name }}</p>
      <h2 class="group-sidebar-title">{{ level().name }}</h2>
    </div>
  </div>

  <div class="group-sidebar-meta">
    <span class="group-sidebar-pill">{{ branch()?.name }}</span>
    <span class="group-sidebar-pill">{{ level().teachers.length }} profesores</span>
    <span class="group-sidebar-pill">{{ level().dances.length }} danzas</span>
  </div>

  <div class="group-sidebar-summary">
    <p>{{ level().shortDescription || level().description }}</p>
  </div>
</aside>

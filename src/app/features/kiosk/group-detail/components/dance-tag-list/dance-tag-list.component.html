<section class="rounded-[1.75rem] border border-stone-200 bg-white p-5 shadow-sm">
  <div class="mb-5">
    <p class="text-xs font-semibold uppercase tracking-[0.24em] text-stone-500">Danzas que se practican</p>
    <h3 class="mt-2 text-2xl font-semibold text-stone-900">Repertorio del grupo</h3>
  </div>

  <div class="flex flex-wrap gap-3">
    @for (dance of dances(); track dance) {
      <span class="rounded-full bg-stone-100 px-4 py-2 text-sm font-medium text-stone-700">
        {{ dance }}
      </span>
    }
  </div>
</section>

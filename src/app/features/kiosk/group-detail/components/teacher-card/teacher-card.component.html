<section class="rounded-[1.75rem] border border-stone-200 bg-white p-5 shadow-sm">
  <div class="mb-4 flex items-center justify-between gap-3">
    <p class="text-xs font-semibold uppercase tracking-[0.24em] text-stone-500">Docencia</p>
    <span class="rounded-full bg-stone-100 px-3 py-1 text-xs font-semibold text-stone-600">
      {{ teachers().length }} docentes
    </span>
  </div>

  <div class="space-y-4">
    @for (teacher of mainTeachers(); track teacher.id ?? teacher.name) {
      <article class="rounded-2xl border border-amber-200 bg-amber-50/50 p-4">
        <div class="flex items-center gap-4">
          <img
            [src]="teacher.portrait"
            [alt]="teacher.name"
            class="h-16 w-16 rounded-xl object-cover"
          />
          <div>
            <h3 class="text-xl font-semibold text-stone-900">{{ teacher.name }}</h3>
            <p class="text-sm font-medium text-amber-700">{{ teacher.role }}</p>
          </div>
        </div>

        <p class="mt-3 text-sm leading-6 text-stone-600">
          {{ teacher.bio }}
        </p>
      </article>
    }

    @for (teacher of supportTeachers(); track teacher.id ?? teacher.name) {
      <article class="rounded-2xl border border-stone-200 bg-stone-50 p-4">
        <div class="flex items-center gap-4">
          <img
            [src]="teacher.portrait"
            [alt]="teacher.name"
            class="h-14 w-14 rounded-xl object-cover"
          />
          <div>
            <h4 class="text-base font-semibold text-stone-900">{{ teacher.name }}</h4>
            <p class="text-xs font-medium uppercase tracking-[0.14em] text-stone-500">
              {{ teacher.role }}
            </p>
          </div>
        </div>
      </article>
    }
  </div>
</section>

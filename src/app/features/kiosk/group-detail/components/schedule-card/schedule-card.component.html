<section class="rounded-[1.75rem] border border-stone-200 bg-white p-5 shadow-sm">
  <div class="mb-5">
    <p class="text-xs font-semibold uppercase tracking-[0.24em] text-stone-500">Horarios de ensayo</p>
    <h3 class="mt-2 text-2xl font-semibold text-stone-900">Próximas sesiones</h3>
  </div>

  <div class="space-y-3">
    @for (schedule of schedules(); track schedule.day + schedule.time) {
      <div class="flex items-center justify-between rounded-[1.25rem] bg-stone-50 px-4 py-4">
        <div>
          <p class="text-base font-semibold text-stone-900">{{ schedule.day }}</p>
          <p class="text-sm text-stone-500">{{ schedule.room }}</p>
        </div>
        <p class="text-sm font-semibold text-stone-700">{{ schedule.time }}</p>
      </div>
    }
  </div>
</section>
